name: Release

on:
  workflow_run:
    workflows: [CI]
    types:
      - completed

permissions:
  contents: write

jobs:
  build:
    if: github.event.workflow_run.conclusion == 'success' && startsWith(github.event.workflow_run.head_branch, 'v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release

      - name: Prepare package
        run: |
          VERSION=${{ github.event.workflow_run.head_branch }}
          VERSION=${VERSION#v}
          mkdir -p "kvn-tui-${VERSION}-x86_64-linux"
          cp target/release/kvn-tui "kvn-tui-${VERSION}-x86_64-linux/"
          cp LICENSE "kvn-tui-${VERSION}-x86_64-linux/"
          tar czf "kvn-tui-${VERSION}-x86_64-linux.tar.gz" "kvn-tui-${VERSION}-x86_64-linux"

      - name: Generate checksums
        run: |
          VERSION=${{ github.event.workflow_run.head_branch }}
          VERSION=${VERSION#v}
          sha256sum "kvn-tui-${VERSION}-x86_64-linux.tar.gz" > checksums.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: |
            kvn-tui-*-x86_64-linux.tar.gz
            checksums.txt

  release:
    needs: build
    if: github.event.workflow_run.conclusion == 'success' && startsWith(github.event.workflow_run.head_branch, 'v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}

      - name: Debug tag info
        run: |
          echo "head_branch: ${{ github.event.workflow_run.head_branch }}"
          echo "head_sha: ${{ github.event.workflow_run.head_sha }}"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-assets

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.workflow_run.head_branch }}
          target_commitish: ${{ github.event.workflow_run.head_sha }}
          files: |
            kvn-tui-*-x86_64-linux.tar.gz
            checksums.txt
          generate_release_notes: true
