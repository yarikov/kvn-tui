name: AUR Deploy

on:
  workflow_run:
    workflows: ["Release"]
    types:
      - completed

jobs:
  aur:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get release version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RELEASE_TAG=$(gh release view --json tagName -q '.tagName' --repo ${{ github.repository }})
          VERSION=${RELEASE_TAG#v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          log-public-key: false

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "github-actions@github.com"

      - name: Add AUR to known hosts
        run: mkdir -p ~/.ssh && ssh-keyscan -H aur.archlinux.org >> ~/.ssh/known_hosts

      - name: Clone AUR repo
        run: git clone ssh://aur@aur.archlinux.org/kvn-tui-bin.git /tmp/aur

      - name: Download tarball and compute checksum
        run: |
          curl -sL "https://github.com/yarikov/kvn-tui/releases/download/v${VERSION}/kvn-tui-${VERSION}-x86_64-linux.tar.gz" -o /tmp/pkg.tar.gz
          SHA256=$(sha256sum /tmp/pkg.tar.gz | awk '{print $1}')
          echo "SHA256=$SHA256" >> $GITHUB_ENV

      - name: Generate PKGBUILD
        run: |
          sed -e "s/{{VERSION}}/${VERSION}/g" \
              -e "s/{{SHA256SUM}}/${SHA256}/g" \
              pkg/aur/PKGBUILD.bin > /tmp/aur/PKGBUILD

      - name: Generate .SRCINFO
        run: |
          docker run --rm -v /tmp/aur:/aur -e RUNNER_UID=$(id -u) archlinux/archlinux bash -c "
            pacman -Sy --noconfirm pacman fakeroot
            useradd -m builder
            chown -R builder:builder /aur
            su builder -c 'cd /aur && makepkg --printsrcinfo > .SRCINFO'
            chown -R \$RUNNER_UID:\$RUNNER_UID /aur
          "

      - name: Commit and push to AUR
        run: |
          cd /tmp/aur
          git add PKGBUILD .SRCINFO
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore(release): update to v${VERSION}"
          git push
